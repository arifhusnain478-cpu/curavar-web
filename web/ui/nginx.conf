# Serves the built React SPA and reverse-proxies the API. The browser only ever
# talks to this origin: `/api/*` is forwarded to the FastAPI service (the /api
# prefix is stripped), so there is no CORS and the Anthropic key stays on the
# server. Everything else falls back to index.html for client-side routing.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # API reverse proxy. Trailing slash on proxy_pass strips the /api/ prefix,
    # so /api/classify -> http://api:8000/classify.
    location /api/ {
        proxy_pass http://api:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 180s;
    }

    # SPA history fallback.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
